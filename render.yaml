services:
  - type: web
    name: shyara-api
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build
    preDeployCommand: npx prisma migrate deploy && npm run db:seed:prod
    startCommand: node dist/index.js
    healthCheckPath: /health
    autoDeployTrigger: commit
    domains:
      - api.invitesbyshyara.com
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ADMIN_PORTAL_URL
        sync: false
      - key: CUSTOMER_ACQUISITION_LOCK_ENABLED
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: SEED_ADMIN_USERS
        value: "true"
      - key: ADMIN_SEED_PASSWORD
        sync: false
      - key: SUPPORT_SEED_PASSWORD
        sync: false
      - key: SEED_TEST_USER
        value: "false"
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_TRANSLATION_MODEL
        value: gemini-2.5-flash
  - type: web
    name: shyara-invite
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_URL
        value: https://api.invitesbyshyara.com
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
