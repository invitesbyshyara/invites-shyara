services:
  - type: web
    name: shyara-api
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build
    preDeployCommand: npx prisma migrate deploy && npm run db:seed:prod
    startCommand: node dist/index.js
    healthCheckPath: /health
    autoDeployTrigger: commit
    domains:
      - api.invitesbyshyara.com
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ADMIN_PORTAL_URL
        sync: false
      - key: API_PUBLIC_URL
        sync: false
      - key: CUSTOMER_ACQUISITION_LOCK_ENABLED
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: SEED_ADMIN_USERS
        value: "true"
      - key: ADMIN_SEED_PASSWORD
        sync: false
      - key: SUPPORT_SEED_PASSWORD
        sync: false
      - key: SEED_TEST_USER
        value: "false"
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_TRANSLATION_MODEL
        value: gemini-2.5-flash
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
  - type: web
    name: shyara-invite
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_URL
        value: https://api.invitesbyshyara.com
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /*
        name: Strict-Transport-Security
        value: max-age=15552000; includeSubDomains
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: accelerometer=(), autoplay=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(self), usb=()
      - path: /*
        name: Content-Security-Policy-Report-Only
        value: default-src 'self'; base-uri 'self'; frame-ancestors 'none'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.invitesbyshyara.com https://accounts.google.com https://www.googleapis.com https://api.razorpay.com https://checkout.razorpay.com https://res.cloudinary.com; script-src 'self' 'unsafe-inline' https://accounts.google.com https://apis.google.com https://checkout.razorpay.com; frame-src https://accounts.google.com https://checkout.razorpay.com; object-src 'none'; form-action 'self';
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
