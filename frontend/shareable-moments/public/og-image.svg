<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0a1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0d2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4a017;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0c040;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="200" fill="#7c3aed" opacity="0.07" />
  <circle cx="150" cy="530" r="180" fill="#a855f7" opacity="0.06" />
  <circle cx="600" cy="315" r="350" fill="#7c3aed" opacity="0.03" />

  <!-- Top accent line -->
  <rect x="80" y="60" width="120" height="4" rx="2" fill="url(#gold)" />

  <!-- Logo / Brand name -->
  <text x="80" y="220" font-family="Georgia, serif" font-size="96" font-weight="700" fill="white" letter-spacing="-2">Shyara</text>

  <!-- Gradient underline under brand -->
  <rect x="80" y="232" width="320" height="5" rx="2.5" fill="url(#accent)" />

  <!-- Tagline -->
  <text x="80" y="310" font-family="Arial, sans-serif" font-size="32" fill="#c4b5fd" letter-spacing="1">Digital Invitations for Life's Most Beautiful Moments</text>

  <!-- Feature pills -->
  <rect x="80" y="370" width="200" height="44" rx="22" fill="#7c3aed" opacity="0.3" />
  <text x="180" y="397" font-family="Arial, sans-serif" font-size="18" fill="#c4b5fd" text-anchor="middle">15 Templates</text>

  <rect x="300" y="370" width="200" height="44" rx="22" fill="#7c3aed" opacity="0.3" />
  <text x="400" y="397" font-family="Arial, sans-serif" font-size="18" fill="#c4b5fd" text-anchor="middle">RSVP Tracking</text>

  <rect x="520" y="370" width="200" height="44" rx="22" fill="#7c3aed" opacity="0.3" />
  <text x="620" y="397" font-family="Arial, sans-serif" font-size="18" fill="#c4b5fd" text-anchor="middle">Instant Sharing</text>

  <!-- Categories row -->
  <text x="80" y="470" font-family="Arial, sans-serif" font-size="28" fill="#9ca3af">Wedding · Engagement · Birthday · Corporate</text>

  <!-- Website URL -->
  <text x="80" y="545" font-family="Arial, sans-serif" font-size="22" fill="#6b7280">invite.shyara.co.in</text>

  <!-- Decorative invite card mockup on right -->
  <rect x="820" y="120" width="300" height="420" rx="20" fill="#1f1235" stroke="#7c3aed" stroke-width="1.5" opacity="0.8" />
  <rect x="820" y="120" width="300" height="90" rx="20" fill="url(#accent)" opacity="0.6" />
  <rect x="820" y="190" width="300" height="20" fill="#1f1235" />
  <!-- Card content lines -->
  <rect x="860" y="240" width="220" height="12" rx="6" fill="#7c3aed" opacity="0.4" />
  <rect x="880" y="268" width="180" height="10" rx="5" fill="#4c1d95" opacity="0.5" />
  <rect x="870" y="296" width="200" height="10" rx="5" fill="#4c1d95" opacity="0.5" />
  <rect x="890" y="330" width="160" height="10" rx="5" fill="#4c1d95" opacity="0.4" />
  <rect x="900" y="358" width="140" height="10" rx="5" fill="#4c1d95" opacity="0.4" />
  <!-- RSVP button mockup -->
  <rect x="880" y="420" width="200" height="44" rx="22" fill="url(#accent)" opacity="0.8" />
  <text x="980" y="447" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">RSVP Now</text>
</svg>
